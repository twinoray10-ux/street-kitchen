<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Street Kitchen — Orders</title>
<meta name="theme-color" content="#1A0A00">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SK Orders">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --fire:#E8460A;--gold:#F5A623;--cream:#FFF8F0;--dark:#1A0A00;
  --panel:#1E0C04;--border:rgba(255,255,255,0.08);--muted:rgba(255,248,240,0.45);
  --green:#4CAF50;--amber:#FF9800;--red:#F44336;
}
html,body{height:100%;font-family:'Syne',sans-serif;background:var(--dark);color:var(--cream)}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:999;background:var(--dark);display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-box{width:100%;max-width:360px;background:var(--panel);border:1px solid rgba(232,70,10,0.25);border-radius:20px;padding:2.5rem;text-align:center}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:4px;margin-bottom:4px}
.login-logo span{color:var(--fire)}
.login-sub{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted);margin-bottom:2rem}
.login-box input{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--cream);font-family:'Syne',sans-serif;font-size:15px;outline:none;text-align:center;letter-spacing:4px;margin-bottom:1rem;transition:border-color 0.2s}
.login-box input:focus{border-color:var(--fire)}
.login-btn{width:100%;background:var(--fire);color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;cursor:pointer}
.login-err{color:var(--fire);font-size:12px;font-family:'Space Mono',monospace;margin-top:0.75rem;min-height:18px}

/* APP */
#app{display:none;min-height:100vh;padding-bottom:2rem}
header{background:var(--panel);border-bottom:1px solid rgba(232,70,10,0.2);padding:0 1.25rem;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.h-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px}
.h-logo span{color:var(--fire)}
.h-right{display:flex;align-items:center;gap:10px}
.notif-btn{background:rgba(232,70,10,0.15);border:1px solid rgba(232,70,10,0.3);color:var(--fire);padding:6px 14px;border-radius:6px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer}

.main{max-width:700px;margin:0 auto;padding:1.5rem 1rem}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);line-height:1}
.stat-l{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:3px;text-transform:uppercase}

/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;margin-bottom:1.25rem;overflow-x:auto;padding-bottom:4px}
.ftab{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;padding:7px 14px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all 0.2s}
.ftab.active{background:var(--fire);border-color:var(--fire);color:#fff}

/* ORDER CARDS */
.orders-list{display:flex;flex-direction:column;gap:12px}
.order-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.2s}
.order-card.new{border-color:var(--fire);animation:pulse 2s ease-in-out 3}
.order-card.preparing{border-color:var(--amber)}
.order-card.done{border-color:rgba(76,175,80,0.4);opacity:0.7}

@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(232,70,10,0)}50%{box-shadow:0 0 0 6px rgba(232,70,10,0.2)}}

.card-header{padding:0.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between;gap:0.5rem}
.card-ref{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--cream)}
.card-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.card-type{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;padding:3px 10px;border-radius:100px}
.card-type.delivery{background:rgba(232,70,10,0.15);color:var(--fire);border:1px solid rgba(232,70,10,0.3)}
.card-type.pickup{background:rgba(245,166,35,0.12);color:var(--gold);border:1px solid rgba(245,166,35,0.25)}

.card-customer{padding:0 1.1rem 0.75rem;display:flex;gap:1rem;font-size:13px}
.card-customer span{color:var(--muted);font-family:'Space Mono',monospace;font-size:11px}
.card-customer b{color:var(--cream)}

.card-items{padding:0 1.1rem;border-top:1px solid var(--border);padding-top:0.75rem;padding-bottom:0.75rem}
.card-item{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.card-item-name{color:var(--cream)}
.card-item-price{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold)}
.card-total{display:flex;justify-content:space-between;padding:8px 0 0;border-top:1px solid var(--border);margin-top:4px}
.card-total-label{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--muted)}
.card-total-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold)}

.card-notes{padding:0 1.1rem 0.75rem;font-size:12px;color:var(--muted);font-style:italic}

.card-actions{padding:0.75rem 1.1rem;border-top:1px solid var(--border);display:flex;gap:8px}
.btn-preparing{background:rgba(255,152,0,0.15);border:1px solid rgba(255,152,0,0.4);color:#FF9800;padding:8px 16px;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;flex:1;transition:all 0.2s}
.btn-preparing:hover{background:rgba(255,152,0,0.3)}
.btn-done{background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.4);color:#4CAF50;padding:8px 16px;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px;cursor:pointer;flex:1;transition:all 0.2s}
.btn-done:hover{background:rgba(76,175,80,0.3)}
.btn-call{background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.25);color:var(--gold);padding:8px 14px;border-radius:8px;font-size:16px;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center}

/* STATUS BADGE */
.status-badge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;padding:3px 9px;border-radius:100px;text-transform:uppercase}
.status-new{background:rgba(232,70,10,0.2);color:var(--fire);border:1px solid rgba(232,70,10,0.4)}
.status-preparing{background:rgba(255,152,0,0.2);color:#FF9800;border:1px solid rgba(255,152,0,0.4)}
.status-done{background:rgba(76,175,80,0.15);color:#4CAF50;border:1px solid rgba(76,175,80,0.3)}

/* EMPTY */
.empty{text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:1rem}
.empty-text{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;color:var(--muted)}

/* NEW ORDER ALERT */
.new-order-alert{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#E8460A;color:#fff;padding:12px 24px;border-radius:100px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;z-index:999;opacity:0;transition:all 0.4s;white-space:nowrap;box-shadow:0 4px 20px rgba(232,70,10,0.5)}
.new-order-alert.show{opacity:1}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:1rem;left:1rem;background:#1E3A1E;border:1px solid var(--green);color:var(--green);font-family:'Space Mono',monospace;font-size:12px;padding:12px 16px;border-radius:10px;z-index:9999;transform:translateY(20px);opacity:0;transition:all 0.3s;text-align:center}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">STREET <span>KITCHEN</span></div>
    <div class="login-sub">OWNER DASHBOARD</div>
    <input type="password" id="pw-input" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" onclick="doLogin()">LOGIN 🔥</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="h-logo">SK <span>ORDERS</span></div>
    <div class="h-right">
      <button class="notif-btn" onclick="enableNotifications()" id="notif-btn">🔔 Enable Alerts</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="main">
    <div class="stats-bar">
      <div class="stat"><div class="stat-n" id="stat-new">0</div><div class="stat-l">New</div></div>
      <div class="stat"><div class="stat-n" id="stat-prep">0</div><div class="stat-l">Preparing</div></div>
      <div class="stat"><div class="stat-n" id="stat-done">0</div><div class="stat-l">Done Today</div></div>
    </div>

    <div class="filter-tabs">
      <button class="ftab active" onclick="setFilter('all',this)">ALL</button>
      <button class="ftab" onclick="setFilter('new',this)">🔥 NEW</button>
      <button class="ftab" onclick="setFilter('preparing',this)">🍳 PREPARING</button>
      <button class="ftab" onclick="setFilter('done',this)">✅ DONE</button>
      <button class="ftab" onclick="clearDoneOrders()" style="border-color:rgba(244,67,54,0.3);color:#F44336;margin-left:auto">🗑 Clear Done</button>
    </div>

    <div class="orders-list" id="orders-list">
      <div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">NO ORDERS YET</div></div>
    </div>
  </div>
</div>

<div class="new-order-alert" id="new-alert">🔥 NEW ORDER INCOMING!</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvn2QXF-vkhXcVjScb-rh1veUdGdoI7qg",
  authDomain: "street-kitchen-9f41e.firebaseapp.com",
  projectId: "street-kitchen-9f41e",
  storageBucket: "street-kitchen-9f41e.firebasestorage.app",
  messagingSenderId: "849439630164",
  appId: "1:849439630164:web:1c6bdc115b4f283026dec1",
  databaseURL: "https://street-kitchen-9f41e-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
window._db = db;
window._update = update;
window._remove = remove;
window._ref = ref;

window.listenOrders = function(){
  onValue(ref(db, 'orders'), (snapshot) => {
    const data = snapshot.val();
    const orders = data ? Object.entries(data).map(([id,o])=>({id,...o})) : [];
    // Sort newest first
    orders.sort((a,b) => b.timestamp - a.timestamp);
    window._allOrders = orders;
    window.renderOrders(orders);
    updateStats(orders);

    // Alert on new orders (after first load)
    if(window._loaded){
      const newOnes = orders.filter(o => o.status === 'new' && o.timestamp > (window._lastCheck||0));
      if(newOnes.length > 0){
        showNewOrderAlert();
        playSound();
      }
    }
    window._lastCheck = Date.now();
    window._loaded = true;
  });
};
</script>

<script>
const DEFAULT_PW = 'rAyRmToHnUdR1738';
let currentFilter = 'all';
window._allOrders = [];
window._loaded = false;

function doLogin(){
  const pw = localStorage.getItem('sk_admin_pw') || DEFAULT_PW;
  if(document.getElementById('pw-input').value === pw){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    setTimeout(()=>{
      if(typeof window.listenOrders === 'function') window.listenOrders();
    }, 400);
  } else {
    document.getElementById('login-err').textContent='Wrong password.';
    document.getElementById('pw-input').value='';
  }
}

function logout(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pw-input').value='';
}

window.renderOrders = function(orders){
  const filtered = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter);
  const list = document.getElementById('orders-list');
  if(!filtered.length){
    list.innerHTML = `<div class="empty"><div class="empty-icon">🍽️</div><div class="empty-text">NO ${currentFilter.toUpperCase()} ORDERS</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(o => orderCard(o)).join('');
};

function orderCard(o){
  const statusClass = o.status || 'new';
  const statusLabel = statusClass === 'new' ? '🔥 NEW' : statusClass === 'preparing' ? '🍳 PREPARING' : '✅ DONE';
  const itemsHtml = (o.items||[]).map(i=>`
    <div class="card-item">
      <span class="card-item-name">${i.name} <span style="color:var(--muted)">x${i.qty}</span></span>
      <span class="card-item-price">${(i.subtotal||i.price*i.qty).toLocaleString()} UGX</span>
    </div>`).join('');

  const actionBtns = statusClass === 'new'
    ? `<button class="btn-preparing" onclick="updateStatus('${o.id}','preparing')">🍳 PREPARING</button>
       <button class="btn-done" onclick="updateStatus('${o.id}','done')">✅ DONE</button>
       <a class="btn-call" href="tel:${o.phone}" title="Call customer">📞</a>`
    : statusClass === 'preparing'
    ? `<button class="btn-done" onclick="updateStatus('${o.id}','done')" style="flex:2">✅ MARK AS DONE</button>
       <a class="btn-call" href="tel:${o.phone}" title="Call customer">📞</a>`
    : `<button class="btn-preparing" onclick="updateStatus('${o.id}','new')" style="opacity:0.6;flex:1">↩ REOPEN</button>`;

  return `<div class="order-card ${statusClass}" id="card-${o.id}">
    <div class="card-header">
      <div>
        <span class="card-ref">#${o.ref||'—'}</span>
        <span class="card-time" style="margin-left:8px">${o.time||''}</span>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="card-type ${o.type||'pickup'}">${o.type==='delivery'?'🛵 DELIVERY':'🏃 PICKUP'}</span>
        <span class="status-badge status-${statusClass}">${statusLabel}</span>
      </div>
    </div>
    <div class="card-customer">
      <div><span>Customer</span><br><b>${o.name||'—'}</b></div>
      <div><span>Phone</span><br><b>${o.phone||'—'}</b></div>
      ${o.address?`<div><span>Address</span><br><b>${o.address}</b></div>`:''}
    </div>
    <div class="card-items">
      ${itemsHtml}
      <div class="card-total">
        <span class="card-total-label">TOTAL</span>
        <span class="card-total-val">${(o.total||0).toLocaleString()} UGX</span>
      </div>
    </div>
    ${o.notes?`<div class="card-notes">📝 ${o.notes}</div>`:''}
    <div class="card-actions">${actionBtns}</div>
  </div>`;
}

async function updateStatus(id, status){
  try {
    if(window._db && window._update && window._ref){
      await window._update(window._ref(window._db, `orders/${id}`), {status});
      showToast(status==='done'?'✅ Order marked done!':status==='preparing'?'🍳 Now preparing!':'↩ Order reopened');
    }
  } catch(e){ showToast('Could not update. Check connection.'); }
}

function updateStats(orders){
  const today = new Date().toDateString();
  document.getElementById('stat-new').textContent = orders.filter(o=>o.status==='new').length;
  document.getElementById('stat-prep').textContent = orders.filter(o=>o.status==='preparing').length;
  document.getElementById('stat-done').textContent = orders.filter(o=>o.status==='done' && new Date(o.timestamp).toDateString()===today).length;
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  window.renderOrders(window._allOrders);
}

function showNewOrderAlert(){
  const a = document.getElementById('new-alert');
  a.classList.add('show');
  setTimeout(()=>a.classList.remove('show'), 4000);
}

function playSound(){
  try {
    const ctx = new AudioContext();
    [0,0.15,0.3].forEach(t=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.3, ctx.currentTime+t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.2);
      osc.start(ctx.currentTime+t);
      osc.stop(ctx.currentTime+t+0.2);
    });
  } catch(e){}
}

async function enableNotifications(){
  if(!('Notification' in window)){ showToast('Notifications not supported on this browser'); return; }
  const permission = await Notification.requestPermission();
  if(permission === 'granted'){
    document.getElementById('notif-btn').textContent = '🔔 Alerts ON';
    document.getElementById('notif-btn').style.background = 'rgba(76,175,80,0.15)';
    document.getElementById('notif-btn').style.borderColor = 'rgba(76,175,80,0.4)';
    document.getElementById('notif-btn').style.color = '#4CAF50';
    showToast('✅ Notifications enabled!');
    new Notification('Street Kitchen 🔥', {body:'You will now get alerts for new orders!'});
  } else {
    showToast('Notifications blocked. Enable in browser settings.');
  }
}

async function clearDoneOrders(){
  const doneOrders = window._allOrders.filter(o => o.status === 'done');
  if(!doneOrders.length){ showToast('No done orders to clear.'); return; }
  if(!confirm(`Delete ${doneOrders.length} completed order(s)? This cannot be undone.`)) return;
  try {
    await Promise.all(doneOrders.map(o =>
      window._remove(window._ref(window._db, `orders/${o.id}`))
    ));
    showToast(`✅ ${doneOrders.length} done order(s) cleared!`);
  } catch(e){ showToast('Error clearing orders. Try again.'); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

// Service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
