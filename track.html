<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Track Your Order — Street Kitchen</title>
<meta name="theme-color" content="#1A0A00">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --fire:#E8460A;--gold:#F5A623;--cream:#FFF8F0;--dark:#1A0A00;
  --panel:#1E0C04;--border:rgba(255,255,255,0.08);--muted:rgba(255,248,240,0.45);
  --green:#4CAF50;
}
html,body{min-height:100vh;font-family:'Syne',sans-serif;background:var(--dark);color:var(--cream);display:flex;flex-direction:column}

nav{background:rgba(26,10,0,0.95);border-bottom:1px solid rgba(232,70,10,0.2);padding:0 1.25rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px}
.nav-logo span{color:var(--fire)}
.nav-back{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px}
.nav-back:hover{color:var(--gold)}

main{flex:1;max-width:480px;width:100%;margin:0 auto;padding:2rem 1.25rem}

/* ── MANUAL SEARCH (shown only when no ?ref param) ── */
.search-box{background:var(--panel);border:1px solid rgba(232,70,10,0.2);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;text-align:center}
.search-box h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:3px;margin-bottom:0.5rem}
.search-box p{font-size:13px;color:var(--muted);margin-bottom:1.25rem;font-family:'Space Mono',monospace}
.search-row{display:flex;gap:8px}
.search-row input{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--cream);font-family:'Space Mono',monospace;font-size:14px;letter-spacing:2px;outline:none;text-transform:uppercase;transition:border-color 0.2s}
.search-row input:focus{border-color:var(--fire)}
.search-row input::placeholder{text-transform:none;letter-spacing:1px}
.search-btn{background:var(--fire);color:#fff;border:none;padding:11px 20px;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s;white-space:nowrap}
.search-btn:hover{opacity:0.85}

/* ── LOADING ── */
.loading-state{text-align:center;padding:3rem 1.25rem}
.loading-icon{font-size:48px;margin-bottom:1rem;animation:spin 1.5s linear infinite;display:inline-block}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.loading-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--muted)}
.loading-sub{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,248,240,0.3);margin-top:6px;letter-spacing:1px}

/* ── LIVE BADGE ── */
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);color:#4CAF50;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:3px 10px;border-radius:100px;margin-bottom:1rem}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── BIG STATUS ── */
.big-status{text-align:center;padding:1.75rem 1.25rem;background:var(--panel);border-radius:16px;margin-bottom:1.25rem;border:1px solid var(--border);position:relative;overflow:hidden}
.big-status::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 0%,var(--glow,rgba(232,70,10,0.09)),transparent);pointer-events:none}
.big-status-icon{font-size:58px;margin-bottom:0.5rem;display:block;animation:float 2.4s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.big-status-text{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,7vw,40px);letter-spacing:3px;line-height:1}
.big-status-sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:1px;line-height:1.6}
.eta-pill{display:inline-flex;align-items:center;gap:6px;margin-top:12px;background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.25);color:var(--gold);font-family:'Space Mono',monospace;font-size:10px;letter-spacing:1px;padding:5px 14px;border-radius:100px}

/* ── PROGRESS BAR ── */
.progress-wrap{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.25rem}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.875rem}
.progress-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--muted)}
.progress-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--gold)}
.progress-track{height:6px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:hidden;margin-bottom:1.5rem}
.progress-fill{height:100%;width:0%;border-radius:100px;background:linear-gradient(90deg,var(--fire),var(--gold));transition:width 1s cubic-bezier(0.34,1.56,0.64,1)}

/* ── STEPS ── */
.steps{display:flex;flex-direction:column}
.step{display:flex;gap:12px;align-items:flex-start;position:relative;padding-bottom:1.25rem}
.step:last-child{padding-bottom:0}
.step:not(:last-child)::after{content:'';position:absolute;left:17px;top:36px;bottom:0;width:2px;background:var(--border);z-index:0}
.step.done:not(:last-child)::after{background:var(--fire)}
.step.active:not(:last-child)::after{background:linear-gradient(var(--fire),var(--border))}

.step-icon{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;position:relative;z-index:1;background:var(--dark);transition:all 0.4s}
.step.done .step-icon{border-color:var(--fire);background:rgba(232,70,10,0.15)}
.step.active .step-icon{border-color:var(--gold);background:rgba(245,166,35,0.12);animation:glow 1.6s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 3px rgba(245,166,35,0.1)}50%{box-shadow:0 0 0 8px rgba(245,166,35,0.2)}}

.step-body{padding-top:5px}
.step-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--muted);transition:color 0.4s;line-height:1}
.step.done .step-label{color:var(--cream)}
.step.active .step-label{color:var(--gold)}
.step-desc{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:3px;line-height:1.4}
.step.active .step-desc{color:rgba(255,248,240,0.55)}

/* ── ORDER HEADER ── */
.order-header{background:var(--panel);border:1px solid rgba(232,70,10,0.2);border-radius:16px;padding:1.25rem;margin-bottom:1.25rem}
.order-ref-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem}
.order-ref{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px}
.order-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.order-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;border-top:1px solid var(--border);padding-top:0.75rem}
.order-meta-item span{display:block;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:2px}
.order-meta-item b{font-size:13px}

/* ── ITEMS ── */
.order-items{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:1.25rem;margin-bottom:1.25rem}
.items-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--muted);margin-bottom:0.75rem}
.item-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.item-row:last-of-type{border-bottom:none}
.item-name{color:var(--cream)}
.item-price{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold)}
.total-row{display:flex;justify-content:space-between;border-top:1px solid rgba(232,70,10,0.2);padding-top:10px;margin-top:6px}
.total-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--muted)}
.total-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold)}

/* ── NOT FOUND ── */
.not-found{text-align:center;padding:2.5rem;background:var(--panel);border-radius:16px;border:1px solid var(--border)}
.not-found-icon{font-size:44px;margin-bottom:0.75rem}
.not-found-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--muted)}
.not-found-sub{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:8px;line-height:1.6}

footer{text-align:center;padding:1.5rem;font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,248,240,0.15);letter-spacing:1px}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">STREET <span>KITCHEN</span></div>
  <a href="index.html" class="nav-back">← Back to menu</a>
</nav>

<main id="main-wrap">
  <!-- Filled dynamically -->
</main>

<footer>STREET KITCHEN KAMPALA &nbsp;·&nbsp; LIVE ORDER TRACKING</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBvn2QXF-vkhXcVjScb-rh1veUdGdoI7qg",
  authDomain: "street-kitchen-9f41e.firebaseapp.com",
  projectId: "street-kitchen-9f41e",
  storageBucket: "street-kitchen-9f41e.firebasestorage.app",
  messagingSenderId: "849439630164",
  appId: "1:849439630164:web:1c6bdc115b4f283026dec1",
  databaseURL: "https://street-kitchen-9f41e-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
let currentListener = null;

// ── 5-STEP STATUS CONFIG ──
const STEPS = [
  { key:'new',      icon:'🔥', label:'ORDER RECEIVED',         desc:'Your order is confirmed & in the queue',           bigText:'ORDER RECEIVED',        bigSub:'We got your order! The kitchen is about to start.',  color:'var(--fire)', glow:'rgba(232,70,10,0.1)',   pct:0,   eta:null         },
  { key:'prepping', icon:'🧂', label:'PREPPING INGREDIENTS',   desc:'Chicken marinated & ingredients cut fresh',        bigText:'PREPPING NOW',          bigSub:'Your ingredients are being freshly prepared.',       color:'var(--gold)', glow:'rgba(245,166,35,0.1)',  pct:25,  eta:'~15–20 min' },
  { key:'cooking',  icon:'🍳', label:'COOKING YOUR ORDER',     desc:'Your food is in the fryer / on the grill',         bigText:'COOKING NOW',           bigSub:'Hot fresh food being cooked just for you — nearly there!', color:'var(--fire)', glow:'rgba(232,70,10,0.12)', pct:55, eta:'~8–12 min'  },
  { key:'packing',  icon:'📦', label:'PACKING & QUALITY CHECK',desc:'Checked, portioned & packed to perfection',       bigText:'ALMOST READY',          bigSub:'Final quality check happening right now. Just a moment!',color:'var(--gold)', glow:'rgba(245,166,35,0.12)', pct:85, eta:'~2–3 min'   },
  { key:'done',     icon:null, label:null, desc:null, bigText:null, bigSub:null, color:'var(--green)', glow:'rgba(76,175,80,0.1)', pct:100, eta:null }
];

// ── BOOT ──
const urlRef = new URLSearchParams(window.location.search).get('ref');

if(urlRef){
  // Came straight from placing an order — show loading then track
  showLoading();
  startTracking(urlRef.toUpperCase());
} else {
  // No ref — show manual search box
  showSearchBox();
}

function showLoading(){
  document.getElementById('main-wrap').innerHTML = `
    <div class="loading-state">
      <span class="loading-icon">🔥</span>
      <div class="loading-text">LOADING YOUR ORDER</div>
      <div class="loading-sub">Connecting to kitchen...</div>
    </div>`;
}

function showSearchBox(){
  document.getElementById('main-wrap').innerHTML = `
    <div class="search-box">
      <h2>🔍 TRACK YOUR ORDER</h2>
      <p>Enter your order reference number</p>
      <div class="search-row">
        <input type="text" id="ref-input" placeholder="e.g. SK84729" maxlength="10" onkeydown="if(event.key==='Enter')manualTrack()"/>
        <button class="search-btn" onclick="manualTrack()">TRACK</button>
      </div>
      <div id="search-err" style="color:var(--fire);font-size:12px;font-family:'Space Mono',monospace;margin-top:0.75rem;min-height:16px"></div>
    </div>
    <div id="result"></div>`;
}

window.manualTrack = function(){
  const raw    = document.getElementById('ref-input').value.trim().toUpperCase();
  const refNum = raw.startsWith('SK') ? raw : 'SK' + raw;
  const err    = document.getElementById('search-err');
  if(raw.length < 5){ err.textContent = 'Please enter your full order reference number.'; return; }
  err.textContent = '';
  document.getElementById('result').innerHTML = `<div style="text-align:center;padding:2rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:12px">Searching...</div>`;
  if(currentListener) currentListener();
  listenToRef(refNum, (order) => {
    if(!order){
      document.getElementById('result').innerHTML = `
        <div class="not-found">
          <div class="not-found-icon">🤔</div>
          <div class="not-found-text">ORDER NOT FOUND</div>
          <div class="not-found-sub">Check your reference number and try again.<br>Looks like: SK84729</div>
        </div>`;
    } else {
      document.getElementById('result').innerHTML = '';
      document.getElementById('main-wrap').innerHTML = buildTrackingHTML(order);
      animateBar(STEPS.find(s=>s.key===(order.status==='preparing'?'cooking':order.status||'new'))?.pct||0);
    }
  });
};

function startTracking(refNum){
  listenToRef(refNum, (order) => {
    if(!order){
      document.getElementById('main-wrap').innerHTML = `
        <div class="not-found" style="margin-top:1rem">
          <div class="not-found-icon">🤔</div>
          <div class="not-found-text">ORDER NOT FOUND</div>
          <div class="not-found-sub">We couldn't find order <b style="color:var(--cream)">${refNum}</b>.<br>It may still be saving — please wait a moment then refresh.</div>
        </div>`;
    } else {
      document.getElementById('main-wrap').innerHTML = buildTrackingHTML(order);
      animateBar(STEPS.find(s=>s.key===(order.status==='preparing'?'cooking':order.status||'new'))?.pct||0);
    }
  });
}

function listenToRef(refNum, cb){
  if(currentListener) currentListener();
  const q = query(ref(db,'orders'), orderByChild('ref'), equalTo(refNum));
  currentListener = onValue(q, snap => {
    const data = snap.val();
    cb(data ? Object.values(data)[0] : null);
  });
}

function buildTrackingHTML(o){
  const isDelivery = o.type === 'delivery';
  const rawStatus  = o.status || 'new';
  const statusKey  = rawStatus === 'preparing' ? 'cooking' : rawStatus;

  // Patch dynamic last step
  STEPS[4].icon    = isDelivery ? '🛵' : '🏃';
  STEPS[4].label   = isDelivery ? 'OUT FOR DELIVERY'  : 'READY FOR PICKUP';
  STEPS[4].desc    = isDelivery ? 'Your rider is on the way!'  : 'Come collect — your food is waiting!';
  STEPS[4].bigText = isDelivery ? 'OUT FOR DELIVERY'  : 'READY FOR PICKUP';
  STEPS[4].bigSub  = isDelivery
    ? 'Your rider is heading to you now. Get ready! 🛵'
    : 'Your order is packed and waiting at the counter. Come pick it up! 🏃';

  const idx    = STEPS.findIndex(s => s.key === statusKey);
  const active = STEPS[Math.max(0,idx)];

  // Steps HTML
  const stepsHtml = STEPS.map((step, i) => {
    const isDone   = i < idx;
    const isActive = i === idx;
    const cls = isDone ? 'done' : isActive ? 'active' : '';
    return `<div class="step ${cls}">
      <div class="step-icon">${isDone ? '✓' : step.icon}</div>
      <div class="step-body">
        <div class="step-label">${step.label}</div>
        <div class="step-desc">${step.desc}</div>
      </div>
    </div>`;
  }).join('');

  // Items HTML
  const itemsHtml = (o.items||[]).map(item =>
    `<div class="item-row">
      <span class="item-name">${item.name} <span style="color:var(--muted)">×${item.qty}</span></span>
      <span class="item-price">${(item.subtotal||item.price*item.qty).toLocaleString()} UGX</span>
    </div>`
  ).join('');

  const etaHtml = active.eta && idx < 4
    ? `<div class="eta-pill">⏱ Est. wait: ${active.eta}</div>`
    : '';

  return `
    <div class="live-badge"><span class="live-dot"></span> LIVE TRACKING</div>

    <!-- BIG STATUS -->
    <div class="big-status" style="--glow:${active.glow}">
      <span class="big-status-icon">${active.icon}</span>
      <div class="big-status-text" style="color:${active.color}">${active.bigText}</div>
      <div class="big-status-sub">${active.bigSub}</div>
      ${etaHtml}
    </div>

    <!-- PROGRESS + STEPS -->
    <div class="progress-wrap">
      <div class="progress-header">
        <span class="progress-label">ORDER PROGRESS</span>
        <span class="progress-pct" id="pct-display">${active.pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
      <div class="steps">${stepsHtml}</div>
    </div>

    <!-- ORDER INFO -->
    <div class="order-header">
      <div class="order-ref-row">
        <span class="order-ref">#${o.ref}</span>
        <span class="order-time">${o.time||''}</span>
      </div>
      <div class="order-meta">
        <div class="order-meta-item"><span>Customer</span><b>${o.name}</b></div>
        <div class="order-meta-item"><span>Order Type</span><b>${isDelivery?'🛵 Delivery':'🏃 Pickup'}</b></div>
        ${o.address?`<div class="order-meta-item" style="grid-column:1/-1"><span>Delivery Address</span><b>${o.address}</b></div>`:''}
      </div>
    </div>

    <!-- ITEMS -->
    <div class="order-items">
      <div class="items-title">YOUR ITEMS</div>
      ${itemsHtml}
      <div class="total-row">
        <span class="total-label">TOTAL</span>
        <span class="total-val">${(o.total||0).toLocaleString()} UGX</span>
      </div>
    </div>

    ${o.notes?`<div style="background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:1rem;font-size:13px;color:var(--muted);margin-bottom:1.25rem">📝 <b style="color:var(--cream)">Note:</b> ${o.notes}</div>`:''}

    <div style="text-align:center;font-family:'Space Mono',monospace;font-size:9px;color:rgba(255,248,240,0.15);letter-spacing:1px;margin-top:0.5rem;margin-bottom:1rem">PAGE UPDATES AUTOMATICALLY · NO NEED TO REFRESH</div>
  `;
}

function animateBar(pct){
  setTimeout(() => {
    const fill = document.getElementById('prog-fill');
    if(fill) fill.style.width = pct + '%';
  }, 120);
}
</script>
</body>
</html>
